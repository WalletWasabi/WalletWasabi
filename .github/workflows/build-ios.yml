name: Build iOS

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          sudo plutil -replace CFBundleShortVersionString -string "26.6" /Applications/Xcode_16.2.app/Contents/Info.plist
          sudo plutil -replace CFBundleShortVersionString -string "26.6" /Applications/Xcode_16.2.app/Contents/version.plist
          sudo plutil -replace Version -string "26.5" /Applications/Xcode_16.2.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk/SDKSettings.plist
          sudo plutil -replace Version -string "26.5" /Applications/Xcode_16.2.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk/SDKSettings.plist
          sudo ln -s iPhoneSimulator.sdk /Applications/Xcode_16.2.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator26.5.sdk
          sudo ln -s iPhoneOS.sdk /Applications/Xcode_16.2.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.5.sdk
          sudo mv /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild.real
          sudo tee /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild <<'EOF'
          #!/bin/bash
          if [[ "$*" == *"-version"* ]]; then
            echo "Xcode 26.6"
            echo "Build version 26D26"
            exit 0
          fi
          exec /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild.real "$@"
          EOF
          sudo chmod +x /Applications/Xcode_16.2.app/Contents/Developer/usr/bin/xcodebuild
          xcodebuild -version

      - name: Install Workloads
        run: dotnet workload install ios

      - name: Build iOS App (Simulator)
        run: |
          dotnet build WalletWasabi.Fluent.iOS/WalletWasabi.Fluent.iOS.csproj \
            -c Release \
            -r iossimulator-arm64 \
            -o publish-app \
            -p:CodesignKey="-"

      - name: Zip iOS App Bundle
        run: |
          zip -r wasabi-ios-app.zip publish-app/WalletWasabi.Fluent.iOS.app

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasabi-ios-app
          path: wasabi-ios-app.zip
