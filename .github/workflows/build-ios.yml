name: Build iOS

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure Xcode Version for SDK 26.4
        run: |
          sudo rm -rf /Applications/Xcode.app
          sudo ln -s /Applications/Xcode_16.2.app /Applications/Xcode.app
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          sudo plutil -replace CFBundleShortVersionString -string "26.4.1" /Applications/Xcode.app/Contents/Info.plist
          sudo plutil -replace CFBundleShortVersionString -string "26.4.1" /Applications/Xcode.app/Contents/version.plist
          sudo plutil -replace Version -string "26.4" /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk/SDKSettings.plist
          sudo plutil -replace Version -string "26.4" /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk/SDKSettings.plist
          sudo plutil -replace Version -string "26.4" /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk/SDKSettings.plist
          sudo ln -s iPhoneSimulator.sdk /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator26.4.sdk
          sudo ln -s iPhoneSimulator.sdk /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator26.sdk
          sudo ln -s iPhoneOS.sdk /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.4.sdk
          sudo ln -s iPhoneOS.sdk /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.sdk
          sudo ln -s MacOSX.sdk /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX26.4.sdk
          sudo ln -s MacOSX.sdk /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX26.sdk
          sudo xcodebuild -license accept
          xcodebuild -version
          xcodebuild -version -sdk iphonesimulator
          xcodebuild -version -sdk macosx

      - name: Install Workloads
        run: dotnet workload install ios --version 10.0.203.1

      - name: Build iOS App (Simulator)
        run: |
          dotnet build WalletWasabi.Fluent.iOS/WalletWasabi.Fluent.iOS.csproj \
            -c Release \
            -r iossimulator-arm64 \
            -o publish-app \
            -p:CodesignKey="-"

      - name: Zip iOS App Bundle
        run: |
          zip -r wasabi-ios-app.zip publish-app/WalletWasabi.Fluent.iOS.app

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasabi-ios-app
          path: wasabi-ios-app.zip
