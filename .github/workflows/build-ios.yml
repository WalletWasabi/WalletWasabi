name: Build iOS

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure Xcode Version for SDK 26.5
        run: |
          sudo rm -rf /Applications/Xcode.app
          sudo ln -s /Applications/Xcode_16.2.app /Applications/Xcode.app
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          sudo plutil -replace Version -string "26.5" /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk/SDKSettings.plist
          sudo plutil -replace Version -string "26.5" /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk/SDKSettings.plist
          sudo ln -s iPhoneSimulator.sdk /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator26.5.sdk
          sudo ln -s iPhoneOS.sdk /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.5.sdk
          sudo mv /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild.real
          sudo tee /tmp/xcodebuild_mock.c <<'EOF'
          #include <stdio.h>
          #include <string.h>
          #include <unistd.h>
          #include <stdlib.h>
          int main(int argc, char *argv[]) {
              for (int i = 1; i < argc; i++) {
                  if (strcmp(argv[i], "-version") == 0) {
                      printf("Xcode 26.6\n");
                      printf("Build version 26D26\n");
                      return 0;
                  }
              }
              char *real_path = "/Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild.real";
              execv(real_path, argv);
              perror("execv failed");
              return 1;
          }
          EOF
          sudo gcc -O2 /tmp/xcodebuild_mock.c -o /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild
          sudo chmod +x /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild
          sudo xcodebuild -license accept
          xcodebuild -version

      - name: Install Workloads
        run: dotnet workload install ios

      - name: Build iOS App (Simulator)
        run: |
          dotnet build WalletWasabi.Fluent.iOS/WalletWasabi.Fluent.iOS.csproj \
            -c Release \
            -r iossimulator-arm64 \
            -o publish-app \
            -p:CodesignKey="-"

      - name: Zip iOS App Bundle
        run: |
          zip -r wasabi-ios-app.zip publish-app/WalletWasabi.Fluent.iOS.app

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasabi-ios-app
          path: wasabi-ios-app.zip
